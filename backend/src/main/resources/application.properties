spring.application.name=rml-manager
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.org.hibernate.envers.global_with_modified_flag=true

# s3/minIO
storage.s3.region=us-east-1
storage.s3.endpoint=http://localhost:9000
storage.s3.path-style-access=true
storage.s3.bucket=rml-assets
storage.s3.presigned-url-expiration=PT1H
storage.s3.access-key=minioadmin
storage.s3.secret-key=minioadmin